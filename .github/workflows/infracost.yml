name: FinOps Cost Check

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

jobs:
  infracost:
    name: Infracost Analysis
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Terraform (optional but good practice)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      # 3. Setup Infracost
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # 4. Run Infracost breakdown (baseline)
      - name: Generate baseline
        run: infracost breakdown --path . --format json --out-file infracost-base.json

      # 5. Run Infracost diff
      - name: Generate diff
        run: infracost diff --path . --compare-to infracost-base.json

      # 6. Comment on PR
      - name: Post Infracost comment
        run: |
          infracost comment github \
            --path infracost-base.json \
            --repo ${{ github.repository }} \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --pull-request ${{ github.event.pull_request.number }}
